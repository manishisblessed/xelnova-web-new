version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npx turbo run build --filter=@xelnova/api-app
  artifacts:
    baseDirectory: apps/api/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/api/.next/cache/**/*
